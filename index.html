<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dev News</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <div class="container">
      <h1 class="logo">The Dev News</h1>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <article class="featured-post">
        <img src="assets/opiniao.jpg" alt="cidade">
        <div class="overlay">
          <p class="categoria">opinião</p>
          <h2>Como é ser um desenvolvedor</h2>
          <p class="autor">By Fabio Tetsuo</p>
        </div>
      </article>

      <aside class="sidebar">
        <h3 class="sidebar-title">Posts populares</h3>
        <ul class="popular-list">
          <li class="popular-item">
            <img src="assets/dev.png" alt="Post 1">
            <div>
              <h4>Desenvolvimento atual</h4>
              <span>22 Agosto 2022</span>
            </div>
          </li>
          <li class="popular-item">
            <img src="assets/git.png" alt="Post 2">
            <div>
              <h4>GitLab vs GitHub</h4>
              <span>22 Agosto 2022</span>
            </div>
          </li>
          <li class="popular-item">
            <img src="assets/cafe.png" alt="Post 3">
            <div>
              <h4>Café atrapalha?</h4>
              <span>22 Agosto 2022</span>
            </div>
          </li>
        </ul>
      </aside>
    </section>

<section class="posts-section">
<article class="featured-post">
  <h3 class="sidebar-title">Posts mais recentes</h3>
</article>

<aside class="sidebar">
  <h3 class="sidebar-title">Categorias</h3>

</aside>

</section>

  </main>

  <footer>
    <p>Copyright&copy;The Dev News</p>
  </footer>

</body>

</html>
